name: rulewise
description: Production-ready government compliance assistant
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Firebase Core & Services
  # Firebase Core & Services
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  
  # UI & Utilities
  intl: ^0.20.2
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  
  # File & Image Handling
  file_picker: ^10.3.8
  image_picker: ^1.2.1
  cached_network_image: ^3.3.0
  
  # Local Storage
  shared_preferences: ^2.5.4
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.2
  
  # HTTP for AI API calls
  http: ^1.6.0
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # Email sending
  mailer: ^6.1.2
  
  # URL Launcher
  url_launcher: ^6.3.2
  html: ^0.15.6
  pdf: ^3.11.3
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0
  timeline_tile: ^2.0.0
  
  # Storage permissions and file handling
  permission_handler: ^11.3.1
  open_file: ^3.5.10
  share_plus: ^10.1.4
  google_mlkit_text_recognition: ^0.15.0
  workmanager: ^0.9.0+3
  razorpay_flutter: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - .env
  
  # Premium Typography via Google Fonts
  # Using Inter font as Circular fallback (configured in theme)

